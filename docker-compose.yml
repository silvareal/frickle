services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: anomaly
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d anomaly"]
      interval: 5s
      timeout: 3s
      retries: 10

  ahnlich:
    image: ghcr.io/deven96/ahnlich-db:latest
    entrypoint: ["sh", "-c"]
    command: ["ahnlich-db run --host 0.0.0.0 --port 1369"]
    ports:
      - "1369:1369"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://demo:demo@postgres:5432/anomaly
      AHNLICH_HOST: ahnlich
      AHNLICH_PORT: "1369"
      ARTIFACT_DIR: /artifacts
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - artifacts:/artifacts
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ahnlich:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  artifacts:
